spring.application.name=crudSpringbootDemo

spring.datasource.url=jdbc:mysql://localhost:3306/student_crud_db
spring.datasource.username=root
spring.datasource.password=Mandabai@09

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Highlight SQL with ANSI colors
spring.jpa.properties.hibernate.highlight_sql=true

# SQL logging
logging.level.org.hibernate.SQL=DEBUG

# Parameter values
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Enable ANSI colors in Spring Boot
spring.output.ansi.enabled=ALWAYS